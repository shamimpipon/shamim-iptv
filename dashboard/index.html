<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <title>IPTV Playlist Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0f1115;
        --card: #161a22;
        --text: #e6e8eb;
        --muted: #9aa4b2;
        --online: #22c55e;
        --offline: #ef4444;
        --unstable: #f59e0b;
        --other: #6b7280;
        --accent: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 20px 24px;
        border-bottom: 1px solid #232833;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
      }
      .summary {
        display: flex;
        gap: 10px;
        padding: 16px 24px;
        flex-wrap: wrap;
      }
      .chip {
        background: var(--card);
        border: 1px solid #232833;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        min-width: 90px;
      }
      .chip b {
        display: block;
        font-size: 20px;
      }
      .controls {
        display: flex;
        gap: 10px;
        padding: 0 24px 16px;
        flex-wrap: wrap;
      }
      input,
      select {
        background: var(--card);
        color: var(--text);
        border: 1px solid #232833;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #1d2129;
      }
      th {
        color: var(--muted);
        position: sticky;
        top: 0;
        background: var(--bg);
      }
      tr:hover {
        background: #12151c;
      }
      .status {
        padding: 3px 8px;
        border-radius: 20px;
        font-size: 11px;
        display: inline-block;
      }
      .status.online {
        background: rgba(34, 197, 94, 0.15);
        color: var(--online);
      }
      .status.unstable {
        background: rgba(245, 158, 11, 0.15);
        color: var(--unstable);
      }
      .status.offline,
      .status.timeout,
      .status.forbidden,
      .status.blocked {
        background: rgba(239, 68, 68, 0.15);
        color: var(--offline);
      }
      .status.invalid_playlist,
      .status.unsupported,
      .status.geo_blocked,
      .status.unknown {
        background: rgba(107, 114, 128, 0.15);
        color: var(--other);
      }
      .wrap {
        padding: 0 24px 40px;
        overflow-x: auto;
      }
      .btn {
        background: var(--accent);
        color: white;
        text-decoration: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }
      .trigger {
        display: flex;
        gap: 10px;
        padding: 0 24px 16px;
        flex-wrap: wrap;
        align-items: center;
      }
      .trigger input {
        flex: 1;
        min-width: 220px;
      }
      .triggerStatus {
        padding: 0 24px 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .url-cell {
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>📡 IPTV Playlist Checker Dashboard</h1>
        <div class="meta" id="meta">Loading...</div>
      </div>
      <a class="btn" id="downloadWorking" href="../output/working.m3u" download
        >Download working.m3u</a
      >
    </header>

    <div class="summary" id="summary"></div>

    <div class="controls">
      <input id="search" type="text" placeholder="🔍 Search channel name..." />
      <select id="statusFilter">
        <option value="">All statuses</option>
      </select>
      <select id="groupFilter">
        <option value="">All groups</option>
      </select>
      <select id="sortBy">
        <option value="score-desc">Sort: Score (high → low)</option>
        <option value="latencyMs-asc">Sort: Latency (fast → slow)</option>
        <option value="name-asc">Sort: Name (A → Z)</option>
      </select>
    </div>

    <div class="trigger">
      <input
        id="triggerUrl"
        type="text"
        placeholder="🔗 M3U/M3U8 প্লেলিস্ট URL পেস্ট করো (একাধিক হলে কমা দিয়ে)"
      />
      <input
        id="ghToken"
        type="password"
        placeholder="🔑 GitHub token (একবার দিলে ব্রাউজারে সেভ থাকবে)"
      />
      <button id="triggerBtn" class="btn" type="button">চেক করো</button>
      <button id="refreshBtn" class="btn" type="button">রিফ্রেশ</button>
    </div>
    <div class="triggerStatus" id="triggerStatus"></div>

    <div class="wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Group</th>
            <th>Status</th>
            <th>Score</th>
            <th>Latency</th>
            <th>Type</th>
            <th>HTTP</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script>
      const DATA_URL =
        new URLSearchParams(location.search).get("data") ||
        "../output/results.json";
      let allResults = [];

      function statusBadge(status) {
        return `<span class="status ${status}">${status}</span>`;
      }

      function render() {
        const q = document.getElementById("search").value.toLowerCase();
        const statusVal = document.getElementById("statusFilter").value;
        const groupVal = document.getElementById("groupFilter").value;
        const sortVal = document.getElementById("sortBy").value;

        let rows = allResults.filter((r) => {
          if (q && !r.name.toLowerCase().includes(q)) return false;
          if (statusVal && r.status !== statusVal) return false;
          if (groupVal && r.group !== groupVal) return false;
          return true;
        });

        const [field, dir] = sortVal.split("-");
        rows.sort((a, b) => {
          let va = a[field],
            vb = b[field];
          if (typeof va === "string") {
            va = va.toLowerCase();
            vb = (vb || "").toLowerCase();
          }
          if (va < vb) return dir === "asc" ? -1 : 1;
          if (va > vb) return dir === "asc" ? 1 : -1;
          return 0;
        });

        document.getElementById("rows").innerHTML = rows
          .map(
            (r) => `
      <tr>
        <td>${r.name}</td>
        <td>${r.group || "-"}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${r.score}</td>
        <td>${r.latencyMs} ms</td>
        <td>${r.type || "-"}</td>
        <td>${r.httpStatus ?? "-"}</td>
        <td class="url-cell" title="${r.url}">${r.url}</td>
      </tr>
    `,
          )
          .join("");
      }

      function renderSummaryAndFilters(data) {
        document.getElementById("meta").textContent =
          `Generated: ${new Date(data.generatedAt).toLocaleString()} · Checked ${data.totalChecked} channels in ${(data.durationMs / 1000).toFixed(1)}s`;

        document.getElementById("summary").innerHTML = Object.entries(
          data.summary,
        )
          .map(
            ([status, count]) => `
      <div class="chip"><b>${count}</b>${status}</div>
    `,
          )
          .join("");

        const statusSelect = document.getElementById("statusFilter");
        Object.keys(data.summary).forEach((s) => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          statusSelect.appendChild(opt);
        });

        const groups = [
          ...new Set(data.results.map((r) => r.group || "Uncategorized")),
        ].sort();
        const groupSelect = document.getElementById("groupFilter");
        groups.forEach((g) => {
          const opt = document.createElement("option");
          opt.value = g;
          opt.textContent = g;
          groupSelect.appendChild(opt);
        });
      }

      fetch(DATA_URL)
        .then((r) => r.json())
        .then((data) => {
          allResults = data.results;
          renderSummaryAndFilters(data);
          render();
        })
        .catch((err) => {
          document.getElementById("meta").textContent =
            "results.json লোড করা যায়নি। প্রথমে checker রান করুন।";
          console.error(err);
        });

      ["search", "statusFilter", "groupFilter", "sortBy"].forEach((id) =>
        document.getElementById(id).addEventListener("input", render),
      );

      // --- Manual trigger via GitHub Actions API ---
      const REPO = "shamimpipon/shamim-iptv";
      const WORKFLOW_FILE = "check.yml";
      const tokenInput = document.getElementById("ghToken");
      const savedToken = localStorage.getItem("iptv_gh_token");
      if (savedToken) tokenInput.value = savedToken;

      async function triggerCheck() {
        const url = document.getElementById("triggerUrl").value.trim();
        const token = tokenInput.value.trim();
        const statusEl = document.getElementById("triggerStatus");
        if (!url) {
          statusEl.textContent = "একটা প্লেলিস্ট URL লিখো।";
          return;
        }
        if (!token) {
          statusEl.textContent = "GitHub token লিখো (নিচে নির্দেশনা দেখো)।";
          return;
        }
        localStorage.setItem("iptv_gh_token", token);
        statusEl.textContent = "ট্রিগার করা হচ্ছে...";
        try {
          const res = await fetch(
            `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                ref: "main",
                inputs: { playlist_url: url },
              }),
            },
          );
          if (res.status === 204) {
            statusEl.textContent =
              "✅ চেক শুরু হয়েছে! প্রায় ৩০-৬০ সেকেন্ড পর 'রিফ্রেশ' বাটনে চাপো।";
          } else {
            const body = await res.text();
            statusEl.textContent = `❌ Error (${res.status}): ${body}`;
          }
        } catch (err) {
          statusEl.textContent = `❌ ব্যর্থ: ${err.message}`;
        }
      }

      document
        .getElementById("triggerBtn")
        .addEventListener("click", triggerCheck);
      document.getElementById("refreshBtn").addEventListener("click", () => {
        const statusEl = document.getElementById("triggerStatus");
        fetch(`${DATA_URL}?t=${Date.now()}`)
          .then((r) => r.json())
          .then((data) => {
            allResults = data.results;
            renderSummaryAndFilters(data);
            render();
            statusEl.textContent = "রিজাল্ট রিফ্রেশ হয়েছে।";
          })
          .catch((err) => {
            statusEl.textContent = "রিফ্রেশ ব্যর্থ: " + err.message;
          });
      });
    </script>
  </body>
</html>
