name: IPTV Playlist Checker

on:
  push:
    paths:
      - "playlists.txt"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      playlist_url:
        description: "One or more playlist URLs, comma-separated (optional, overrides playlists.txt)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: iptv-checker
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run checker (manual URLs)
        if: ${{ github.event.inputs.playlist_url != '' }}
        env:
          PLAYLIST_URLS: ${{ github.event.inputs.playlist_url }}
        run: |
          args=()
          while IFS= read -r line || [ -n "$line" ]; do
            url="$(echo "$line" | xargs)"
            [[ -z "$url" ]] && continue
            echo "Checking source: $url"
            args+=(--input "$url")
          done < <(echo "$PLAYLIST_URLS" | tr ',' '\n')
          if [ ${#args[@]} -eq 0 ]; then
            echo "No playlist URL provided."
            exit 1
          fi
          node index.js "${args[@]}" --output ./output --concurrency 30

      - name: Run checker (playlists.txt)
        if: ${{ github.event.inputs.playlist_url == '' }}
        run: |
          args=()
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            echo "Checking source: $line"
            args+=(--input "$line")
          done < playlists.txt
          if [ ${#args[@]} -eq 0 ]; then
            echo "No playlist sources found in playlists.txt. Add at least one URL."
            exit 1
          fi
          node index.js "${args[@]}" --output ./output --concurrency 30

      - name: Commit results
        run: |
          git config user.name "iptv-checker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/results.json output/working.m3u output/best_working.m3u
          git diff --staged --quiet || git commit -m "chore: update IPTV check results [skip ci]"
          git push
